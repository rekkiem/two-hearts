ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.twohearts.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/twohearts"
    url = ${?DATABASE_URL}
    user = "twohearts"
    user = ${?DATABASE_USER}
    password = "twohearts123"
    password = ${?DATABASE_PASSWORD}
    poolSize = 20
    poolSize = ${?DATABASE_POOL_SIZE}
}

jwt {
    secret = "change-this-in-production-min-32-characters!!"
    secret = ${?JWT_SECRET}
    issuer = "twohearts"
    accessExpirySeconds = 900
    refreshExpirySeconds = 2592000
}

mail {
    host = "localhost"
    host = ${?MAIL_HOST}
    port = 1025
    port = ${?MAIL_PORT}
    from = "noreply@twohearts.app"
    from = ${?MAIL_FROM}
    tls = false
    tls = ${?MAIL_TLS}
}

minio {
    endpoint = "http://localhost:9000"
    endpoint = ${?MINIO_ENDPOINT}
    accessKey = "twohearts"
    accessKey = ${?MINIO_ACCESS_KEY}
    secretKey = "twohearts123"
    secretKey = ${?MINIO_SECRET_KEY}
    bucket = "photos"
    bucket = ${?MINIO_BUCKET}
}

app {
    baseUrl = "http://localhost:8080"
    baseUrl = ${?APP_BASE_URL}
    magicLinkExpiryMinutes = 15
    matchesPerDay = 3
}
